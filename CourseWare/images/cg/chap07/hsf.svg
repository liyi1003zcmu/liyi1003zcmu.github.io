<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
    </style>

    <!-- White Background -->
    <rect x="0" y="0" width="900" height="550" fill="white"/>

    <!-- Title (Embedded for standalone file) -->
    <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">隐面消除：深度测试对比 (Depth Testing)</text>

    <!-- Main Content Group (Shifted down slightly to accommodate title) -->
    <g transform="translate(0, 50)">
        <!-- Definitions -->
        <defs>
            <!-- Gradients for 3D effect -->
            <linearGradient id="gradRed" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#ff8a80;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#d32f2f;stop-opacity:1" />
            </linearGradient>
            <linearGradient id="gradBlue" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#90caf9;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#1976d2;stop-opacity:1" />
            </linearGradient>
            <filter id="shadow" height="130%">
                <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                <feOffset dx="3" dy="3" result="offsetblur"/>
                <feComponentTransfer>
                    <feFuncA type="linear" slope="0.3"/>
                </feComponentTransfer>
                <feMerge> 
                    <feMergeNode/>
                    <feMergeNode in="SourceGraphic"/> 
                </feMerge>
            </filter>
            <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#666" />
            </marker>
        </defs>

        <!-- Background Grid Lines for depth perception cues -->
        <g stroke="#e0e0e0" stroke-width="1">
            <line x1="50" y1="400" x2="850" y2="400" />
            <line x1="50" y1="350" x2="850" y2="350" />
            <line x1="50" y1="300" x2="850" y2="300" />
        </g>

        <!-- Z-Axis Indicator -->
        <g transform="translate(820, 420)">
            <line x1="0" y1="0" x2="0" y2="-100" stroke="#666" stroke-width="2" marker-end="url(#arrow)"/>
            <text x="-20" y="-110" font-size="12" fill="#666">Z深度</text>
            <text x="10" y="-10" font-size="10" fill="#999">近 (Near)</text>
            <text x="10" y="-80" font-size="10" fill="#999">远 (Far)</text>
        </g>

        <!-- Scenario 1: Correct Occlusion -->
        <g transform="translate(100, 80)">
            <text x="120" y="-30" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e7d32">✔ 正确结果</text>
            <text x="120" y="-5" text-anchor="middle" font-size="14" fill="#555">开启深度测试 (Z-Test ON)</text>

            <!-- Blue Square (Far, Z=0.8) -->
            <rect x="80" y="80" width="120" height="120" fill="url(#gradBlue)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
            <text x="140" y="110" fill="white" font-weight="bold" font-size="14">物体 B</text>
            <text x="140" y="130" fill="white" font-size="12">Z = 0.8 (远)</text>

            <!-- Red Square (Near, Z=0.2) -->
            <!-- Visually drawn ON TOP -->
            <rect x="40" y="40" width="120" height="120" fill="url(#gradRed)" stroke="#b71c1c" stroke-width="2" filter="url(#shadow)"/>
            <text x="60" y="70" fill="white" font-weight="bold" font-size="14">物体 A</text>
            <text x="60" y="90" fill="white" font-size="12">Z = 0.2 (近)</text>
            
            <!-- Explanation Box -->
            <g transform="translate(0, 250)">
                <rect x="0" y="0" width="240" height="80" rx="5" fill="#e8f5e9" stroke="#2e7d32"/>
                <text x="10" y="25" font-size="12" fill="#333" font-weight="bold">原理：</text>
                <text x="10" y="45" font-size="11" fill="#333">1. 绘制物体A，写入深度 0.2。</text>
                <text x="10" y="60" font-size="11" fill="#333">2. 绘制物体B，深度 0.8 &gt; 0.2。</text>
                <text x="10" y="75" font-size="11" fill="#d32f2f">3. 测试失败，重叠部分不绘制。</text>
            </g>
        </g>

        <!-- Scenario 2: Incorrect Occlusion -->
        <g transform="translate(500, 80)">
            <text x="120" y="-30" text-anchor="middle" font-size="20" font-weight="bold" fill="#c62828">✘ 错误结果</text>
            <text x="120" y="-5" text-anchor="middle" font-size="14" fill="#555">关闭深度测试 (Z-Test OFF)</text>

            <!-- Note about draw order -->
            <text x="120" y="15" text-anchor="middle" font-size="12" fill="#e65100">绘制顺序：先画红，再画蓝</text>

            <!-- Red Square (Near, Z=0.2) -->
            <!-- Drawn FIRST -->
            <rect x="40" y="40" width="120" height="120" fill="url(#gradRed)" stroke="#b71c1c" stroke-width="2" opacity="0.6" stroke-dasharray="5,5"/>
            <text x="50" y="70" fill="#b71c1c" font-weight="bold" font-size="14">物体 A (被覆盖)</text>
            <text x="50" y="90" fill="#b71c1c" font-size="12">Z = 0.2 (近)</text>

            <!-- Blue Square (Far, Z=0.8) -->
            <!-- Drawn SECOND, covering Red -->
            <rect x="80" y="80" width="120" height="120" fill="url(#gradBlue)" stroke="#1565c0" stroke-width="2" filter="url(#shadow)"/>
            <text x="140" y="110" fill="white" font-weight="bold" font-size="14">物体 B</text>
            <text x="140" y="130" fill="white" font-size="12">Z = 0.8 (远)</text>

            <!-- Explanation Box -->
            <g transform="translate(0, 250)">
                <rect x="0" y="0" width="240" height="80" rx="5" fill="#ffebee" stroke="#c62828"/>
                <text x="10" y="25" font-size="12" fill="#333" font-weight="bold">错误原因 (画家算法问题)：</text>
                <text x="10" y="45" font-size="11" fill="#333">显卡只是简单地按顺序覆盖颜色。</text>
                <text x="10" y="60" font-size="11" fill="#333">虽然A在物理上更近，但因为B</text>
                <text x="10" y="75" font-size="11" fill="#333">是后画的，所以直接覆盖了A。</text>
            </g>
        </g>

        <!-- Conceptual Diagram at bottom -->
        <g transform="translate(330, 420)">
            <text x="100" y="0" text-anchor="middle" font-size="14" font-weight="bold" fill="#555">深度缓冲 (Z-Buffer) 状态示意</text>
            
            <!-- Pixel grid simulation -->
            <rect x="20" y="10" width="160" height="40" fill="#eee" stroke="#999"/>
            <line x1="100" y1="10" x2="100" y2="50" stroke="#999"/>
            
            <text x="60" y="25" text-anchor="middle" font-size="10">像素(x,y)</text>
            <text x="60" y="40" text-anchor="middle" font-size="12" font-weight="bold" fill="#2e7d32">0.2</text>
            
            <text x="140" y="25" text-anchor="middle" font-size="10">颜色缓冲</text>
            <rect x="130" y="30" width="20" height="10" fill="#d32f2f"/>
        </g>
    </g>
</svg>