<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
    </style>
    
    <!-- Background -->
    <rect x="0" y="0" width="900" height="450" fill="white"/>

    <!-- Title -->
    <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">Z-Buffer 算法：像素级实战演示</text>
    <text x="450" y="70" text-anchor="middle" font-size="16" fill="#666">可视化过程：新片元如何通过测试覆盖旧像素</text>

    <!-- Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333" />
        </marker>
        
        <!-- Pixel Gradients -->
        <linearGradient id="gradOld" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffcdd2;stop-opacity:1" /> <!-- Reddish -->
            <stop offset="100%" style="stop-color:#e57373;stop-opacity:1" />
        </linearGradient>
        <linearGradient id="gradNew" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#bbdefb;stop-opacity:1" /> <!-- Bluish -->
            <stop offset="100%" style="stop-color:#64b5f6;stop-opacity:1" />
        </linearGradient>
    </defs>

    <!-- ================= VISUAL DEMO ================= -->
    <g transform="translate(50, 100)">
        
        <!-- SECTION A: CURRENT STATE -->
        <g transform="translate(20, 40)">
            <text x="60" y="-10" text-anchor="middle" font-weight="bold" fill="#555">当前缓冲区状态</text>
            
            <!-- Buffer Box -->
            <rect x="0" y="0" width="120" height="120" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
            
            <!-- Pixel (x,y) -->
            <rect x="40" y="40" width="40" height="40" fill="url(#gradOld)" stroke="#d32f2f" stroke-width="2"/>
            <text x="60" y="60" text-anchor="middle" font-size="10" fill="white">Old Pixel</text>
            <text x="60" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Z = 0.8</text>

            <text x="60" y="140" text-anchor="middle" font-size="12" fill="#666">这里已经有个红色物体</text>
            <text x="60" y="155" text-anchor="middle" font-size="12" fill="#666">深度为 0.8 (较远)</text>
        </g>

        <!-- VS Text -->
        <text x="180" y="100" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">VS</text>

        <!-- SECTION B: INCOMING FRAGMENT -->
        <g transform="translate(220, 40)">
            <text x="60" y="-10" text-anchor="middle" font-weight="bold" fill="#555">新来的片元</text>
            
            <!-- Fragment Rep -->
            <rect x="40" y="40" width="40" height="40" fill="url(#gradNew)" stroke="#1976d2" stroke-width="2" stroke-dasharray="5,3"/>
            <text x="60" y="60" text-anchor="middle" font-size="10" fill="white">New Frag</text>
            <text x="60" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Z = 0.5</text>

            <text x="60" y="140" text-anchor="middle" font-size="12" fill="#666">尝试绘制蓝色物体</text>
            <text x="60" y="155" text-anchor="middle" font-size="12" fill="#666">深度为 0.5 (较近)</text>
        </g>

        <!-- Arrow -->
        <line x1="360" y1="100" x2="420" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

        <!-- SECTION C: THE TEST -->
        <g transform="translate(450, 40)">
            <text x="75" y="-10" text-anchor="middle" font-weight="bold" fill="#fbc02d">裁判 (Z-Test)</text>
            
            <rect x="0" y="20" width="150" height="100" rx="10" fill="#fffde7" stroke="#fbc02d" stroke-width="2"/>
            
            <text x="75" y="50" text-anchor="middle" font-size="14">0.5 &lt; 0.8 ?</text>
            <text x="75" y="80" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e7d32">TRUE (是)</text>
            <text x="75" y="105" text-anchor="middle" font-size="12" fill="#555">新物体更近！</text>
        </g>

        <!-- Arrow -->
        <line x1="620" y1="100" x2="680" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

        <!-- SECTION D: RESULT -->
        <g transform="translate(700, 40)">
            <text x="60" y="-10" text-anchor="middle" font-weight="bold" fill="#2e7d32">最终结果</text>
            
            <!-- Buffer Box -->
            <rect x="0" y="0" width="120" height="120" fill="#f5f5f5" stroke="#999" stroke-width="2"/>
            
            <!-- Pixel (x,y) Updated -->
            <rect x="40" y="40" width="40" height="40" fill="url(#gradNew)" stroke="#1976d2" stroke-width="2"/>
            <text x="60" y="60" text-anchor="middle" font-size="10" fill="white">Updated</text>
            <text x="60" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Z = 0.5</text>

            <text x="60" y="140" text-anchor="middle" font-size="12" fill="#666">原来的红色被覆盖</text>
            <text x="60" y="155" text-anchor="middle" font-size="12" fill="#666">更新 Z 值为 0.5</text>
        </g>

    </g>

    <!-- Teacher's Note Footer -->
    <g transform="translate(50, 350)">
        <rect x="0" y="0" width="800" height="80" rx="5" fill="#f5f5f5" stroke="#ccc"/>
        <text x="20" y="30" font-weight="bold" fill="#333">👨‍🏫 老师的备忘录 (Key Notes):</text>
        <text x="40" y="55" font-size="14" fill="#555">1. <tspan font-weight="bold">初始化：</tspan> 每一帧开始时，必须把 Z-buffer 清空为最大值（通常是 1.0 或 无穷大），表示“无限远”。</text>
        <text x="40" y="75" font-size="14" fill="#555">2. <tspan font-weight="bold">效率：</tspan> 如果测试失败（被遮挡），GPU 会直接跳过后续昂贵的像素着色计算（Early-Z），这是显卡高性能的关键！</text>
    </g>

</svg>