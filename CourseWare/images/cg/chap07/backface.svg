<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
        .label { font-weight: bold; }
    </style>
    
    <!-- White Background -->
    <rect x="0" y="0" width="900" height="550" fill="white"/>

    <!-- Title -->
    <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">背面剔除：立方体模型 (Cube Case)</text>
    <text x="450" y="70" text-anchor="middle" font-size="16" fill="#666">任何时刻，你最多只能看到立方体的 3 个面</text>

    <!-- Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#555" />
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32" />
        </marker>
        <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#c62828" />
        </marker>
        <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#1976d2" />
        </marker>

        <!-- Eye Icon -->
        <g id="eyeIcon">
             <path d="M0,15 Q25,0 50,15 Q25,30 0,15 Z" fill="white" stroke="#333" stroke-width="2"/>
             <circle cx="25" cy="15" r="7" fill="#333"/>
        </g>
    </defs>

    <!-- Central Scene Group -->
    <g transform="translate(450, 280)">
        
        <!-- ============ BACK FACES (Invisible) ============ -->
        <!-- Drawn first so they appear "behind" -->
        
        <!-- Back Face (The one strictly behind) -->
        <polygon points="-100,-100 100,-100 100,100 -100,100" fill="#ffebee" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="5,5" opacity="0.5" transform="translate(40, -40)"/>
        <!-- Normal Vector for Back Face -->
        <line x1="40" y1="-40" x2="80" y2="-80" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)" stroke-dasharray="3,3"/>
        <text x="90" y="-80" font-size="12" fill="#c62828">背面 (Back)</text>

        <!-- Bottom Face -->
        <polygon points="-100,100 100,100 140,60 -60,60" fill="#ffebee" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
        <!-- Normal Vector for Bottom Face -->
        <line x1="20" y1="80" x2="20" y2="140" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)" stroke-dasharray="3,3"/>
        <text x="30" y="130" font-size="12" fill="#c62828">底面 (Bottom)</text>

        <!-- Left Face -->
        <polygon points="-100,-100 -100,100 -60,60 -60,-140" fill="#ffebee" stroke="#ef9a9a" stroke-width="1" stroke-dasharray="5,5" opacity="0.5"/>
         <!-- Normal Vector for Left Face -->
        <line x1="-80" y1="-20" x2="-140" y2="-20" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)" stroke-dasharray="3,3"/>
        <text x="-180" y="-15" font-size="12" fill="#c62828">左面 (Left)</text>


        <!-- ============ FRONT FACES (Visible) ============ -->
        <!-- Drawn last to appear "in front" -->

        <!-- Front Face -->
        <polygon points="-100,-100 100,-100 100,100 -100,100" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3" fill-opacity="0.8"/>
        <!-- Normal Vector -->
        <line x1="0" y1="0" x2="-30" y2="50" stroke="#2e7d32" stroke-width="4" marker-end="url(#arrowGreen)"/>
        <text x="-40" y="70" font-size="14" font-weight="bold" fill="#2e7d32">正面 (Front)</text>

        <!-- Right Face -->
        <polygon points="100,-100 100,100 140,60 140,-140" fill="#c8e6c9" stroke="#2e7d32" stroke-width="3" fill-opacity="0.8"/>
        <!-- Normal Vector -->
        <line x1="120" y1="-20" x2="180" y2="-20" stroke="#2e7d32" stroke-width="4" marker-end="url(#arrowGreen)"/>
        <text x="190" y="-15" font-size="14" font-weight="bold" fill="#2e7d32">右面 (Right)</text>

        <!-- Top Face -->
        <polygon points="-100,-100 100,-100 140,-140 -60,-140" fill="#a5d6a7" stroke="#2e7d32" stroke-width="3" fill-opacity="0.8"/>
        <!-- Normal Vector -->
        <line x1="20" y1="-120" x2="20" y2="-180" stroke="#2e7d32" stroke-width="4" marker-end="url(#arrowGreen)"/>
        <text x="30" y="-190" font-size="14" font-weight="bold" fill="#2e7d32">顶面 (Top)</text>

    </g>

    <!-- Camera Position -->
    <g transform="translate(200, 450)">
        <use href="#eyeIcon" transform="scale(1.5)"/>
        <text x="60" y="20" font-size="16" font-weight="bold" fill="#333">观察者视点</text>
        <line x1="50" y1="0" x2="150" y2="-100" stroke="#1976d2" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="5,5"/>
        <text x="130" y="-60" font-size="12" fill="#1976d2">视线方向 (View Dir)</text>
    </g>

    <!-- Explanation Panels -->
    
    <!-- Visible Logic -->
    <g transform="translate(50, 100)">
        <rect x="0" y="0" width="220" height="120" rx="5" fill="#e8f5e9" stroke="#2e7d32"/>
        <text x="110" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2e7d32">🟢 保留 (Cull None)</text>
        <line x1="20" y1="45" x2="200" y2="45" stroke="#a5d6a7"/>
        <text x="20" y="70" font-size="13" fill="#333">• 正面 (Front)</text>
        <text x="20" y="90" font-size="13" fill="#333">• 右面 (Right)</text>
        <text x="20" y="110" font-size="13" fill="#333">• 顶面 (Top)</text>
    </g>

    <!-- Invisible Logic -->
    <g transform="translate(630, 100)">
        <rect x="0" y="0" width="220" height="120" rx="5" fill="#ffebee" stroke="#c62828"/>
        <text x="110" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">❌ 剔除 (Cull Back)</text>
        <line x1="20" y1="45" x2="200" y2="45" stroke="#ef9a9a"/>
        <text x="20" y="70" font-size="13" fill="#333">• 背面 (Back)</text>
        <text x="20" y="90" font-size="13" fill="#333">• 左面 (Left)</text>
        <text x="20" y="110" font-size="13" fill="#333">• 底面 (Bottom)</text>
    </g>

    <!-- Summary Formula -->
    <g transform="translate(550, 450)">
         <text x="0" y="0" font-size="14" fill="#555">判断依据：法线方向 vs 视线方向</text>
         <text x="0" y="25" font-size="14" fill="#333">1. 法线指向屏幕外 = <tspan fill="#2e7d32" font-weight="bold">可见</tspan></text>
         <text x="0" y="50" font-size="14" fill="#333">2. 法线指向屏幕内 = <tspan fill="#c62828" font-weight="bold">剔除</tspan></text>
    </g>

</svg>