<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
        .math { font-family: 'Times New Roman', serif; font-style: italic; font-weight: bold;}
    </style>
    
    <!-- Background -->
    <rect x="0" y="0" width="900" height="500" fill="white"/>

    <!-- Title -->
    <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">方式二：向量点积判别 (Geometric Dot Product)</text>
    <text x="450" y="80" text-anchor="middle" font-size="14" fill="#666">利用 法线(N) 与 视线(V) 的夹角进行物理判断</text>

    <!-- Definitions -->
    <defs>
        <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#1976d2" />
        </marker>
        <marker id="arrowNormal" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#333" />
        </marker>
         <!-- Eye Icon -->
        <g id="eyeIcon">
             <path d="M0,10 Q20,-5 40,10 Q20,25 0,10 Z" fill="white" stroke="#333" stroke-width="2"/>
             <circle cx="20" cy="10" r="5" fill="#333"/>
        </g>
    </defs>

    <!-- Layout Divider -->
    <line x1="450" y1="100" x2="450" y2="450" stroke="#eee" stroke-width="2" stroke-dasharray="5,5"/>


    <!-- LEFT SCENARIO: VISIBLE (Angle < 90) -->
    <g transform="translate(50, 20)">
        <text x="200" y="80" text-anchor="middle" font-size="18" font-weight="bold" fill="#2e7d32">可见 (Visible)</text>
        
        <!-- Surface Line -->
        <path d="M 50,250 Q 200,220 350,250" fill="none" stroke="#999" stroke-width="3"/>
        
        <!-- Point on Surface -->
        <circle cx="200" cy="235" r="4" fill="#333"/>

        <!-- Normal Vector (N) -->
        <line x1="200" y1="235" x2="200" y2="135" stroke="#333" stroke-width="3" marker-end="url(#arrowNormal)"/>
        <text x="210" y="150" font-size="16" class="math">N</text>

        <!-- View Vector (V) - Pointing to Eye -->
        <line x1="200" y1="235" x2="260" y2="150" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowBlue)"/>
        <text x="270" y="170" font-size="16" fill="#1976d2" class="math">V</text>

        <!-- Eye Position -->
        <g transform="translate(260, 130)">
             <use href="#eyeIcon" />
        </g>

        <!-- Angle Arc -->
        <path d="M 200,200 A 35,35 0 0 1 220,205" fill="none" stroke="#2e7d32" stroke-width="2"/>
        <text x="225" y="195" font-size="14" fill="#2e7d32" font-weight="bold">θ &lt; 90°</text>

        <!-- Math Box -->
        <rect x="80" y="280" width="240" height="80" rx="5" fill="#e8f5e9" stroke="#2e7d32"/>
        <text x="200" y="310" text-anchor="middle" font-size="16" class="math" fill="#2e7d32">V · N &gt; 0</text>
        <text x="200" y="335" text-anchor="middle" font-size="12" fill="#333">方向基本一致 (锐角)</text>
    </g>


    <!-- RIGHT SCENARIO: CULLED (Angle > 90) -->
    <!-- Shifted up drastically (-10 relative to origin) to clear bottom text area completely -->
    <g transform="translate(500, -20)"> 
        <text x="200" y="120" text-anchor="middle" font-size="18" font-weight="bold" fill="#c62828">剔除 (Invisible)</text>
        
        <!-- Surface Line (Curved away) -->
        <path d="M 50,250 Q 200,280 350,250" fill="none" stroke="#999" stroke-width="3"/>
        
        <!-- Point on Surface -->
        <circle cx="200" cy="265" r="4" fill="#333"/>

        <!-- Normal Vector (N) - Pointing Down/Away -->
        <line x1="200" y1="265" x2="200" y2="310" stroke="#333" stroke-width="3" marker-end="url(#arrowNormal)"/>
        <text x="210" y="350" font-size="16" class="math">N</text>

        <!-- View Vector (V) - Pointing Up to Eye -->
        <line x1="200" y1="265" x2="260" y2="180" stroke="#1976d2" stroke-width="3" marker-end="url(#arrowBlue)"/>
        <text x="270" y="200" font-size="16" fill="#1976d2" class="math">V</text>
        
        <!-- Eye Position -->
        <g transform="translate(260, 160)">
             <use href="#eyeIcon" />
        </g>

        <!-- Angle Arc (Large) -->
        <path d="M 200,295 A 30,30 0 0 0 220,235" fill="none" stroke="#c62828" stroke-width="2" stroke-dasharray="4,2"/>
        <text x="230" y="300" font-size="14" fill="#c62828" font-weight="bold">θ &gt; 90°</text>

        <!-- Math Box -->
        <rect x="80" y="320" width="240" height="80" rx="5" fill="#ffebee" stroke="#c62828"/>
        <text x="200" y="350" text-anchor="middle" font-size="16" class="math" fill="#c62828">V · N &lt; 0</text>
        <text x="200" y="375" text-anchor="middle" font-size="12" fill="#333">方向背道而驰 (钝角)</text>
    </g>

    <!-- Formula Section -->
    <g transform="translate(200, 420)">
        <rect x="0" y="0" width="500" height="50" rx="5" fill="#f5f5f5" stroke="#999" stroke-dasharray="5,5"/>
        <text x="250" y="30" text-anchor="middle" font-size="14" fill="#333">
            核心公式：<tspan font-family="Times New Roman" font-style="italic" font-weight="bold">dot(View, Normal) = |V|·|N|·cos(θ)</tspan>
        </text>
    </g>

</svg>