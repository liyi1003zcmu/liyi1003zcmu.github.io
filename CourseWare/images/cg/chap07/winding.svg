<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
        .vertex-bg { fill: white; stroke-width: 0; }
        .vertex-text { font-weight: bold; font-size: 14px; fill: white; text-anchor: middle; dominant-baseline: central; }
    </style>
    
    <!-- Background -->
    <rect x="0" y="0" width="900" height="500" fill="white"/>

    <!-- Title -->
    <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="bold" fill="#333">方式一：顶点缠绕顺序 (Winding Order)</text>
    <text x="450" y="70" text-anchor="middle" font-size="14" fill="#666">适用于屏幕空间 (Screen Space) 的快速判别</text>

    <!-- Layout Divider -->
    <line x1="450" y1="100" x2="450" y2="450" stroke="#eee" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- DEFINITIONS -->
    <defs>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32" />
        </marker>
        <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#c62828" />
        </marker>
    </defs>


    <!-- LEFT: Counter-Clockwise (Visible) -->
    <g transform="translate(50, 120)">
        <text x="200" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#2e7d32">逆时针 (CCW)</text>
        <text x="200" y="25" text-anchor="middle" font-size="14" fill="#555">Front Face / 正面</text>

        <!-- Triangle -->
        <path d="M 100,220 L 300,220 L 200,80 Z" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3" stroke-linejoin="round"/>
        
        <!-- Arrows indicating path 1->2->3 -->
        <!-- 1 to 2 -->
        <path d="M 130,210 L 270,210" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>
        <!-- 2 to 3 -->
        <path d="M 290,200 L 210,90" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>
        <!-- 3 to 1 -->
        <path d="M 190,90 L 110,200" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)" fill="none"/>

        <!-- Circular Arrow in center -->
        <path d="M 220,170 A 20,20 0 1 0 180,170" fill="none" stroke="#2e7d32" stroke-width="3" marker-end="url(#arrowGreen)"/>

        <!-- Vertices -->
        <circle cx="100" cy="220" r="14" fill="#2e7d32"/> <text x="100" y="220" class="vertex-text">1</text>
        <circle cx="300" cy="220" r="14" fill="#2e7d32"/> <text x="300" y="220" class="vertex-text">2</text>
        <circle cx="200" cy="80" r="14" fill="#2e7d32"/>  <text x="200" y="80" class="vertex-text">3</text>
        
        <!-- Result Box -->
        <rect x="80" y="280" width="240" height="40" rx="5" fill="#2e7d32"/>
        <text x="200" y="305" text-anchor="middle" font-weight="bold" fill="white">保留绘制 (Render)</text>
    </g>


    <!-- RIGHT: Clockwise (Culled) -->
    <g transform="translate(500, 120)">
        <text x="200" y="0" text-anchor="middle" font-size="18" font-weight="bold" fill="#c62828">顺时针 (CW)</text>
        <text x="200" y="25" text-anchor="middle" font-size="14" fill="#555">Back Face / 背面</text>

        <!-- Triangle (Dashed line implies ghost/removed) -->
        <path d="M 100,220 L 300,220 L 200,80 Z" fill="#ffebee" stroke="#c62828" stroke-width="3" stroke-linejoin="round" stroke-dasharray="8,4"/>
        
        <!-- Arrows indicating path 1->3->2 (Visual layout implies vertices swapped relative to CCW logic, or simple traversal order change) -->
        <!-- Let's label vertices to create CW order: 1(BottomLeft) -> 2(Top) -> 3(BottomRight) for this shape is technically... let's stick to 1->2->3 traversal visuals -->
        
        <!-- To make visual CW on this triangle shape: 1(Top) -> 2(Right) -> 3(Left) OR 1(Left)->2(Top)->3(Right) is CCW. 
             So for CW: 1(Left) -> 2(BottomRight) -> 3(Top) is CW? No.
             1(Left) -> 2(Top) -> 3(Right) is Clockwise? No, that's Up-Right-Down (Clockwise-ish?).
             Wait. Triangle: Top(A), Right(B), Left(C). A->B->C is Clockwise.
        -->
        
        <!-- Let's set vertices positions specifically for CW flow 1->2->3 -->
        <!-- Vertex 1: Top (200, 80) -->
        <!-- Vertex 2: Right (300, 220) -->
        <!-- Vertex 3: Left (100, 220) -->
        
        <!-- 1 to 2 -->
        <path d="M 210,90 L 290,200" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>
        <!-- 2 to 3 -->
        <path d="M 290,220 L 110,220" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>
        <!-- 3 to 1 -->
        <path d="M 110,210 L 190,90" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)" fill="none"/>

        <!-- Circular Arrow in center (CW) -->
        <path d="M 180,170 A 20,20 0 1 1 220,170" fill="none" stroke="#c62828" stroke-width="3" marker-end="url(#arrowRed)"/>

        <!-- Vertices -->
        <circle cx="200" cy="80" r="14" fill="#c62828"/> <text x="200" y="80" class="vertex-text">1</text>
        <circle cx="300" cy="220" r="14" fill="#c62828"/> <text x="300" y="220" class="vertex-text">2</text>
        <circle cx="100" cy="220" r="14" fill="#c62828"/> <text x="100" y="220" class="vertex-text">3</text>

        <!-- Result Box -->
        <rect x="80" y="280" width="240" height="40" rx="5" fill="#c62828"/>
        <text x="200" y="305" text-anchor="middle" font-weight="bold" fill="white">剔除 (Cull)</text>
    </g>

</svg>