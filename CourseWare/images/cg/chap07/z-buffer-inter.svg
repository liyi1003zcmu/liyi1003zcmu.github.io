<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
        .grid-line { stroke: #ddd; stroke-width: 1; }
        .highlight-box { fill: none; stroke: #333; stroke-width: 2; stroke-dasharray: 4,4; }
    </style>
    
    <!-- Background -->
    <rect x="0" y="0" width="900" height="550" fill="white"/>

    <!-- Title -->
    <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">图形存储结构：帧缓存 vs 深度缓存</text>
    <text x="450" y="70" text-anchor="middle" font-size="16" fill="#666">分辨率: m × n (像素)</text>

    <!-- Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#555" />
        </marker>
        
        <!-- Color Gradient for Framebuffer -->
        <linearGradient id="gradColor" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#f8bbd0;stop-opacity:1" />
            <stop offset="50%" style="stop-color:#b39ddb;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#90caf9;stop-opacity:1" />
        </linearGradient>
        
        <!-- Depth Gradient -->
        <linearGradient id="gradDepth" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#333;stop-opacity:1" />
        </linearGradient>
    </defs>


    <!-- ================= LEFT: FRAME BUFFER (COLOR) ================= -->
    <g transform="translate(50, 120)">
        <text x="150" y="-10" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">帧缓存 (Frame Buffer)</text>
        <text x="150" y="15" text-anchor="middle" font-size="14" fill="#555">存储颜色 (Color)</text>

        <!-- The Grid (m x n) -->
        <rect x="0" y="30" width="300" height="200" fill="url(#gradColor)" stroke="#1565c0" stroke-width="3"/>
        
        <!-- Grid lines visualization -->
        <line x1="0" y1="80" x2="300" y2="80" stroke="white" stroke-opacity="0.5"/>
        <line x1="0" y1="130" x2="300" y2="130" stroke="white" stroke-opacity="0.5"/>
        <line x1="0" y1="180" x2="300" y2="180" stroke="white" stroke-opacity="0.5"/>
        <line x1="100" y1="30" x2="100" y2="230" stroke="white" stroke-opacity="0.5"/>
        <line x1="200" y1="30" x2="200" y2="230" stroke="white" stroke-opacity="0.5"/>

        <!-- Dimensions Label -->
        <text x="150" y="250" text-anchor="middle" font-size="14" font-weight="bold">宽度 m</text>
        <text x="-20" y="130" text-anchor="middle" font-size="14" font-weight="bold" transform="rotate(-90, -20, 130)">高度 n</text>

        <!-- Selected Pixel -->
        <rect x="120" y="100" width="20" height="20" fill="none" stroke="#c62828" stroke-width="3"/>
        <line x1="140" y1="120" x2="180" y2="280" stroke="#c62828" stroke-width="1" stroke-dasharray="4,2"/>
        <line x1="120" y1="120" x2="20" y2="280" stroke="#c62828" stroke-width="1" stroke-dasharray="4,2"/>

        <!-- ZOOM IN: PIXEL STRUCTURE -->
        <g transform="translate(20, 280)">
            <text x="130" y="-10" text-anchor="middle" font-weight="bold" fill="#c62828">单像素结构 (Pixel)</text>
            <text x="130" y="10" text-anchor="middle" font-size="12" fill="#555">共 4 字节 (32 bits)</text>

            <!-- R Byte -->
            <rect x="0" y="20" width="60" height="80" fill="#ef5350" stroke="#b71c1c" stroke-width="2"/>
            <text x="30" y="65" text-anchor="middle" font-weight="bold" fill="white" font-size="16">R</text>
            <text x="30" y="115" text-anchor="middle" font-size="12">1 Byte</text>

            <!-- G Byte -->
            <rect x="65" y="20" width="60" height="80" fill="#66bb6a" stroke="#1b5e20" stroke-width="2"/>
            <text x="95" y="65" text-anchor="middle" font-weight="bold" fill="white" font-size="16">G</text>
            <text x="95" y="115" text-anchor="middle" font-size="12">1 Byte</text>

            <!-- B Byte -->
            <rect x="130" y="20" width="60" height="80" fill="#42a5f5" stroke="#0d47a1" stroke-width="2"/>
            <text x="160" y="65" text-anchor="middle" font-weight="bold" fill="white" font-size="16">B</text>
            <text x="160" y="115" text-anchor="middle" font-size="12">1 Byte</text>

            <!-- A Byte -->
            <rect x="195" y="20" width="60" height="80" fill="#bdbdbd" stroke="#424242" stroke-width="2"/>
            <text x="225" y="65" text-anchor="middle" font-weight="bold" fill="white" font-size="16">A</text>
            <text x="225" y="115" text-anchor="middle" font-size="12">1 Byte</text>
        </g>
    </g>


    <!-- ================= RIGHT: DEPTH BUFFER (Z) ================= -->
    <g transform="translate(550, 120)">
        <text x="150" y="-10" text-anchor="middle" font-size="20" font-weight="bold" fill="#424242">深度缓存 (Depth Buffer)</text>
        <text x="150" y="15" text-anchor="middle" font-size="14" fill="#555">存储 Z 值 (Depth)</text>

        <!-- The Grid (m x n) -->
        <rect x="0" y="30" width="300" height="200" fill="url(#gradDepth)" stroke="#424242" stroke-width="3"/>
        
        <!-- Grid lines visualization -->
        <line x1="0" y1="80" x2="300" y2="80" stroke="#999" stroke-opacity="0.5"/>
        <line x1="0" y1="130" x2="300" y2="130" stroke="#999" stroke-opacity="0.5"/>
        <line x1="0" y1="180" x2="300" y2="180" stroke="#999" stroke-opacity="0.5"/>
        <line x1="100" y1="30" x2="100" y2="230" stroke="#999" stroke-opacity="0.5"/>
        <line x1="200" y1="30" x2="200" y2="230" stroke="#999" stroke-opacity="0.5"/>

        <!-- Dimensions Label -->
        <text x="150" y="250" text-anchor="middle" font-size="14" font-weight="bold">宽度 m</text>
        <!-- Height label omitted to avoid clutter, implied by left side -->

        <!-- Selected Pixel (Same Position) -->
        <rect x="120" y="100" width="20" height="20" fill="none" stroke="#ff8f00" stroke-width="3"/>
        <line x1="120" y1="120" x2="60" y2="280" stroke="#ff8f00" stroke-width="1" stroke-dasharray="4,2"/>
        <line x1="140" y1="120" x2="240" y2="280" stroke="#ff8f00" stroke-width="1" stroke-dasharray="4,2"/>

        <!-- ZOOM IN: PIXEL STRUCTURE -->
        <g transform="translate(60, 280)">
            <text x="90" y="-10" text-anchor="middle" font-weight="bold" fill="#ff8f00">单像素结构 (Pixel)</text>
            <text x="90" y="10" text-anchor="middle" font-size="12" fill="#555">1 字节 (8 bits)*</text>

            <!-- Z Byte -->
            <rect x="0" y="20" width="180" height="80" fill="#e0e0e0" stroke="#616161" stroke-width="2"/>
            
            <!-- Internal visual bits representation -->
            <line x1="22.5" y1="20" x2="22.5" y2="100" stroke="#bdbdbd"/>
            <line x1="45" y1="20" x2="45" y2="100" stroke="#bdbdbd"/>
            <line x1="67.5" y1="20" x2="67.5" y2="100" stroke="#bdbdbd"/>
            <line x1="90" y1="20" x2="90" y2="100" stroke="#bdbdbd"/>
            <line x1="112.5" y1="20" x2="112.5" y2="100" stroke="#bdbdbd"/>
            <line x1="135" y1="20" x2="135" y2="100" stroke="#bdbdbd"/>
            <line x1="157.5" y1="20" x2="157.5" y2="100" stroke="#bdbdbd"/>

            <text x="90" y="65" text-anchor="middle" font-weight="bold" fill="#333" font-size="20">Z Value</text>
            <text x="90" y="115" text-anchor="middle" font-size="12">0 ~ 255 (8-bit int)</text>
        </g>
    </g>

    <!-- Connection Arrow -->
    <g transform="translate(450, 180)">
        <text x="0" y="-20" text-anchor="middle" font-size="12" fill="#555" font-style="italic">一一对应关系</text>
        <path d="M -80,0 L 80,0" stroke="#333" stroke-width="2" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    </g>
</svg>