<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="900" height="550" viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg">
    <style>
        text {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            cursor: default;
        }
        .label { font-weight: bold; }
        .vertex-label { font-weight: bold; font-size: 14px; fill: white; }
    </style>
    
    <!-- White Background -->
    <rect x="0" y="0" width="900" height="550" fill="white"/>

    <!-- Title -->
    <text x="450" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#333">背面剔除原理 (Back-Face Culling)</text>
    <text x="450" y="70" text-anchor="middle" font-size="16" fill="#666">基于顶点缠绕顺序 (Winding Order) 的判断</text>

    <!-- Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#555" />
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#2e7d32" />
        </marker>
        <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#c62828" />
        </marker>
        <!-- Eye Icon -->
        <g id="eyeIcon">
             <path d="M0,15 Q25,0 50,15 Q25,30 0,15 Z" fill="none" stroke="#333" stroke-width="2"/>
             <circle cx="25" cy="15" r="7" fill="#333"/>
        </g>
    </defs>

    <!-- Layout Grid -->
    <line x1="450" y1="100" x2="450" y2="500" stroke="#eee" stroke-width="2" stroke-dasharray="5,5"/>

    <!-- ================= LEFT SIDE: Front Face (CCW) ================= -->
    <g transform="translate(50, 120)">
        <text x="200" y="0" text-anchor="middle" font-size="20" font-weight="bold" fill="#2e7d32">保留 (Visible)</text>
        <text x="200" y="25" text-anchor="middle" font-size="14" fill="#555">正面朝向摄像机</text>
        
        <!-- Eye looking at triangle -->
        <g transform="translate(175, 280) scale(0.8)">
            <use href="#eyeIcon"/>
        </g>
        <text x="200" y="320" text-anchor="middle" font-size="12" fill="#666">摄像机 / 观察者</text>

        <!-- The Triangle (Green) -->
        <path d="M 100,200 L 300,200 L 200,80 Z" fill="#e8f5e9" stroke="#2e7d32" stroke-width="3" stroke-linejoin="round"/>
        
        <!-- Normal Vector -->
        <line x1="200" y1="160" x2="200" y2="220" stroke="#2e7d32" stroke-width="2" stroke-dasharray="4,2"/>
        <line x1="200" y1="160" x2="200" y2="100" stroke="#2e7d32" stroke-width="3" marker-end="url(#arrowGreen)"/>
        <text x="210" y="110" font-size="14" fill="#2e7d32" font-weight="bold">N (法线)</text>

        <!-- Winding Order Arrows (CCW) -->
        <path d="M 120,190 A 40,40 0 0 1 200,90" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
        <path d="M 210,90 A 40,40 0 0 1 290,190" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>
        <path d="M 290,210 A 40,40 0 0 1 110,210" fill="none" stroke="#2e7d32" stroke-width="2" marker-end="url(#arrowGreen)"/>

        <!-- Vertex Labels -->
        <circle cx="100" cy="200" r="12" fill="#2e7d32"/>
        <text x="100" y="205" text-anchor="middle" class="vertex-label">1</text>

        <circle cx="300" cy="200" r="12" fill="#2e7d32"/>
        <text x="300" y="205" text-anchor="middle" class="vertex-label">2</text>

        <circle cx="200" cy="80" r="12" fill="#2e7d32"/>
        <text x="200" y="85" text-anchor="middle" class="vertex-label">3</text>

        <!-- Logic Box -->
        <rect x="50" y="350" width="300" height="60" rx="5" fill="#e8f5e9" stroke="#2e7d32"/>
        <text x="200" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#2e7d32">逆时针 (Counter-Clockwise)</text>
        <text x="200" y="395" text-anchor="middle" font-size="12" fill="#333">1 → 2 → 3</text>
    </g>


    <!-- ================= RIGHT SIDE: Back Face (CW) ================= -->
    <g transform="translate(500, 120)">
        <text x="200" y="0" text-anchor="middle" font-size="20" font-weight="bold" fill="#c62828">剔除 (Culled)</text>
        <text x="200" y="25" text-anchor="middle" font-size="14" fill="#555">背面朝向摄像机</text>

        <!-- Eye looking at triangle -->
        <g transform="translate(175, 280) scale(0.8)">
            <use href="#eyeIcon"/>
        </g>
        <text x="200" y="320" text-anchor="middle" font-size="12" fill="#666">摄像机 / 观察者</text>

        <!-- The Triangle (Red, slightly faded) -->
        <path d="M 100,200 L 300,200 L 200,80 Z" fill="#ffebee" stroke="#c62828" stroke-width="3" stroke-linejoin="round" stroke-dasharray="5,5"/>
        
        <!-- Big Cross mark -->
        <line x1="150" y1="100" x2="250" y2="200" stroke="#c62828" stroke-width="8" opacity="0.3"/>
        <line x1="250" y1="100" x2="150" y2="200" stroke="#c62828" stroke-width="8" opacity="0.3"/>

        <!-- Normal Vector (Pointing Away) -->
        <!-- Visually represented as pointing INTO the screen or simply opposite to view -->
        <line x1="200" y1="120" x2="200" y2="180" stroke="#c62828" stroke-width="3" marker-end="url(#arrowRed)"/>
        <text x="215" y="170" font-size="14" fill="#c62828" font-weight="bold">N</text>
        <text x="225" y="185" font-size="10" fill="#c62828">(指向屏幕内/背离)</text>

        <!-- Winding Order Arrows (CW) -->
        <!-- Note: Vertices are swapped to create CW order visually -->
        <path d="M 120,210 A 40,40 0 0 0 280,210" fill="none" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)"/>
        <path d="M 290,190 A 40,40 0 0 0 210,90" fill="none" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)"/>
        <path d="M 190,90 A 40,40 0 0 0 110,190" fill="none" stroke="#c62828" stroke-width="2" marker-end="url(#arrowRed)"/>

        <!-- Vertex Labels (Swapped 2 and 3 logic relative to CCW for visual CW effect) -->
        <!-- To make it CW: Top(1) -> Right(2) -> Left(3). Or Left(1)->Top(2)->Right(3) is CCW. 
             Let's stick to the drawing: 
             Left(1), Right(2), Top(3). 
             1->3->2 is CW. 
             1->2->3 is CCW.
             
             In this diagram, I will label them to force CW order: 
             Left=1, Top=2, Right=3. 
        -->
        <circle cx="100" cy="200" r="12" fill="#c62828"/>
        <text x="100" y="205" text-anchor="middle" class="vertex-label">1</text>

        <circle cx="200" cy="80" r="12" fill="#c62828"/>
        <text x="200" y="85" text-anchor="middle" class="vertex-label">2</text>
        
        <circle cx="300" cy="200" r="12" fill="#c62828"/>
        <text x="300" y="205" text-anchor="middle" class="vertex-label">3</text>

        <!-- Logic Box -->
        <rect x="50" y="350" width="300" height="60" rx="5" fill="#ffebee" stroke="#c62828"/>
        <text x="200" y="375" text-anchor="middle" font-size="14" font-weight="bold" fill="#c62828">顺时针 (Clockwise)</text>
        <text x="200" y="395" text-anchor="middle" font-size="12" fill="#333">1 → 2 → 3</text>
    </g>

</svg>