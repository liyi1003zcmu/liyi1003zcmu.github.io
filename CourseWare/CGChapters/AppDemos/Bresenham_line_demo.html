<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bresenham 算法交互演示 - 计算机图形学</title>
    
    <!-- 引入 React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .canvas-container {
            background-color: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
        .panel {
            background-color: #252526;
            border: 1px solid #3e3e42;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 0.25rem;
        }
        .input-group input {
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
            padding: 4px 8px;
            width: 100%;
            font-family: monospace;
        }
        /* 表格样式 */
        .data-table th, .data-table td {
            padding: 6px 10px;
            text-align: left;
        }
        .data-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 配置常量
        const GRID_SIZE = 20;   // 20x20 网格
        const CELL_SIZE = 30;   // 单元格像素大小
        const CANVAS_SIZE = GRID_SIZE * CELL_SIZE;

        const App = () => {
            // --- 状态定义 ---
            // 坐标输入状态
            const [coords, setCoords] = useState({ x0: 2, y0: 3, x1: 15, y1: 8 });
            
            // 交互状态
            const [clickState, setClickState] = useState('idle'); // 'idle', 'setting_start'
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentStep, setCurrentStep] = useState(0);
            
            // 计算结果状态
            const [algoData, setAlgoData] = useState({ 
                points: [], 
                logs: [], 
                steep: false, 
                dx: 0, dy: 0,
                const1: 0, // 2dy
                const2: 0  // 2dy - 2dx
            });

            const canvasRef = useRef(null);

            // --- 算法核心：Bresenham ---
            const calculateBresenham = (x0, y0, x1, y1) => {
                let points = [];
                let logs = []; // 记录每一步的详细数据用于展示
                
                let x = x0;
                let y = y0;
                
                let dx = Math.abs(x1 - x0);
                let dy = Math.abs(y1 - y0);
                
                // 判断是否陡峭 (斜率 > 1)
                let isSteep = dy > dx;

                // 教学用变形：如果陡峭，交换xy进行计算
                let t_x0 = x0, t_y0 = y0, t_x1 = x1, t_y1 = y1;
                if (isSteep) {
                    [t_x0, t_y0] = [t_y0, t_x0];
                    [t_x1, t_y1] = [t_y1, t_x1];
                }
                
                // 重新计算变换后的 dx, dy, sx, sy
                let t_dx = Math.abs(t_x1 - t_x0);
                let t_dy = Math.abs(t_y1 - t_y0);
                let t_sx = (t_x0 < t_x1) ? 1 : -1;
                let t_sy = (t_y0 < t_y1) ? 1 : -1;
                
                // 计算常量
                let const1 = 2 * t_dy;             // P < 0 时的增量
                let const2 = 2 * t_dy - 2 * t_dx;  // P >= 0 时的增量
                
                let P = 2 * t_dy - t_dx; // 初始 P
                
                let cx = t_x0;
                let cy = t_y0;
                
                // 总步数
                const totalSteps = t_dx; 

                for (let i = 0; i <= totalSteps; i++) {
                    // 记录点 (如果是陡峭模式，存的时候要换回来)
                    let realX = isSteep ? cy : cx;
                    let realY = isSteep ? cx : cy;
                    
                    points.push({ x: realX, y: realY, step: i });
                    
                    // 准备下一轮的推导公式字符串
                    let derivation = "";
                    let nextP = P; // 暂存

                    // 预测下一个动作和P值
                    let actionStr = "";
                    if (i < totalSteps) {
                        if (P >= 0) {
                            actionStr = isSteep ? "NE (y+1, x+1)" : "NE (x+1, y+1)";
                            derivation = `P${i} + (2Δy - 2Δx) = ${P} + (${const2}) = ${P + const2}`;
                        } else {
                            actionStr = isSteep ? "E (y+1)" : "E (x+1)";
                            derivation = `P${i} + 2Δy = ${P} + (${const1}) = ${P + const1}`;
                        }
                    } else {
                        actionStr = "结束";
                        derivation = "-";
                    }

                    // 记录当前状态日志
                    logs.push({
                        step: i,
                        p: P,
                        x: realX,
                        y: realY,
                        action: actionStr,
                        calc: derivation
                    });

                    // 迭代更新 P 和 坐标
                    if (i < totalSteps) {
                        cx += t_sx;
                        if (P >= 0) {
                            cy += t_sy;
                            P = P + const2;
                        } else {
                            P = P + const1;
                        }
                    }
                }

                setAlgoData({
                    points,
                    logs,
                    steep: isSteep,
                    dx: dx, // 原始 dx
                    dy: dy, // 原始 dy
                    p0: 2 * t_dy - t_dx,
                    // 这里的 const 是基于变换后的 t_dy/t_dx
                    const1: const1, 
                    const2: const2
                });
            };

            // --- 副作用处理 ---
            useEffect(() => {
                calculateBresenham(coords.x0, coords.y0, coords.x1, coords.y1);
                setCurrentStep(0);
                setIsPlaying(false);
            }, [coords]);

            useEffect(() => {
                let timer;
                if (isPlaying) {
                    if (currentStep < algoData.points.length) {
                        timer = setTimeout(() => {
                            setCurrentStep(s => s + 1);
                        }, 200);
                    } else {
                        setIsPlaying(false);
                    }
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, algoData.points.length]);

            // 绘图逻辑
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                // 1. 清屏
                ctx.fillStyle = "#1e1e1e";
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // 2. 画网格
                drawGrid(ctx);
                drawAxes(ctx);

                // 3. 画理想直线 (数学上的直线)
                drawIdealLine(ctx, coords.x0, coords.y0, coords.x1, coords.y1);

                // 4. 画像素
                algoData.points.forEach((pt, index) => {
                    if (index < currentStep) { 
                        const isHead = index === currentStep - 1;
                        drawPixel(ctx, pt.x, pt.y, isHead);
                    }
                });
                
                // 5. 交互预览
                if (clickState === 'setting_start') {
                    const startPos = toScreen(coords.x0, coords.y0);
                    ctx.strokeStyle = "#FFFF00";
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(startPos.x + CELL_SIZE/2, startPos.y + CELL_SIZE/2, 5, 0, Math.PI*2);
                    ctx.stroke();
                }

            }, [algoData, currentStep, coords, clickState]);


            // --- 交互处理 ---
            const handleCanvasClick = (e) => {
                const rect = canvasRef.current.getBoundingClientRect();
                const cx = e.clientX - rect.left;
                const cy = e.clientY - rect.top;
                let gx = Math.floor(cx / CELL_SIZE);
                let gy = Math.floor((CANVAS_SIZE - cy) / CELL_SIZE);
                if (gx < 0) gx = 0; if (gx >= GRID_SIZE) gx = GRID_SIZE - 1;
                if (gy < 0) gy = 0; if (gy >= GRID_SIZE) gy = GRID_SIZE - 1;

                if (clickState === 'idle') {
                    setCoords(prev => ({ ...prev, x0: gx, y0: gy }));
                    setClickState('setting_start');
                    setCurrentStep(0); 
                } else {
                    setCoords(prev => ({ ...prev, x1: gx, y1: gy }));
                    setClickState('idle');
                }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setCoords(prev => ({ ...prev, [name]: parseInt(value) || 0 }));
            };

            const loadPreset = (type) => {
                if (type === 'flat') { 
                    setCoords({ x0: 2, y0: 3, x1: 15, y1: 8 });
                } else { 
                    setCoords({ x0: 3, y0: 2, x1: 9, y1: 16 });
                }
            };

            // --- 绘图辅助 ---
            const toScreen = (x, y) => ({
                x: x * CELL_SIZE,
                y: CANVAS_SIZE - (y + 1) * CELL_SIZE
            });

            const drawGrid = (ctx) => {
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 1;
                for (let i = 0; i <= GRID_SIZE; i++) {
                    ctx.beginPath(); ctx.moveTo(i * CELL_SIZE, 0); ctx.lineTo(i * CELL_SIZE, CANVAS_SIZE); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, i * CELL_SIZE); ctx.lineTo(CANVAS_SIZE, i * CELL_SIZE); ctx.stroke();
                }
            };
            
            const drawAxes = (ctx) => {
                ctx.strokeStyle = "#666";
                ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0, CANVAS_SIZE); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, CANVAS_SIZE); ctx.lineTo(CANVAS_SIZE, CANVAS_SIZE); ctx.stroke();
            };

            const drawPixel = (ctx, x, y, isHead) => {
                const pos = toScreen(x, y);
                ctx.fillStyle = isHead ? "#FCD34D" : "#3B82F6"; 
                ctx.fillRect(pos.x + 2, pos.y + 2, CELL_SIZE - 4, CELL_SIZE - 4);
                ctx.fillStyle = isHead ? "#000" : "#FFF";
                ctx.font = "10px monospace";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(`(${x},${y})`, pos.x + CELL_SIZE/2, pos.y + CELL_SIZE/2);
            };

            const drawIdealLine = (ctx, x0, y0, x1, y1) => {
                const p0 = toScreen(x0, y0);
                const p1 = toScreen(x1, y1);
                const offset = CELL_SIZE / 2;
                ctx.beginPath();
                ctx.moveTo(p0.x + offset, p0.y + offset);
                ctx.lineTo(p1.x + offset, p1.y + offset);
                ctx.strokeStyle = "#EF4444"; 
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            };

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <header className="mb-4 text-center">
                        <h1 className="text-2xl font-bold text-blue-400">Bresenham 直线生成算法演示</h1>
                        <p className="text-gray-500 text-xs mt-1">仅使用整数加减与位移运算的经典算法</p>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-6 w-full max-w-6xl">
                        
                        {/* 左侧：交互与画布 */}
                        <div className="flex flex-col gap-4">
                            <div className="canvas-container relative">
                                <canvas 
                                    ref={canvasRef}
                                    width={CANVAS_SIZE}
                                    height={CANVAS_SIZE}
                                    onClick={handleCanvasClick}
                                    className="cursor-crosshair block"
                                    title="点击设置起点，再次点击设置终点"
                                />
                                <div className="absolute top-2 left-2 bg-black/50 px-2 py-1 rounded text-xs text-gray-300 pointer-events-none">
                                    {clickState === 'idle' ? "状态: 就绪 (点击设定起点)" : "状态: 设定终点中..."}
                                </div>
                                <div className="absolute bottom-2 right-2 text-xs text-gray-600 pointer-events-none select-none">
                                    Grid: {GRID_SIZE}x{GRID_SIZE}
                                </div>
                            </div>

                            <div className="panel p-3 rounded flex justify-between items-center">
                                <div className="text-xs text-gray-400">
                                    进度: <span className="text-white font-mono">{currentStep} / {algoData.points.length}</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => {setIsPlaying(false); setCurrentStep(0);}} className="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-white">重置</button>
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`px-3 py-1 rounded text-xs text-white w-20 ${isPlaying ? 'bg-yellow-600' : 'bg-green-600'}`}>
                                        {isPlaying ? "暂停" : "自动播放"}
                                    </button>
                                    <button onClick={() => {setIsPlaying(false); setCurrentStep(Math.min(currentStep + 1, algoData.points.length));}} className="px-3 py-1 bg-blue-600 hover:bg-blue-500 rounded text-xs text-white">单步 &gt;</button>
                                </div>
                            </div>
                        </div>

                        {/* 右侧：控制面板与数据 */}
                        <div className="flex-1 flex flex-col gap-4 min-w-[300px]">
                            
                            {/* 输入控制区 */}
                            <div className="panel p-4 rounded">
                                <h3 className="text-sm font-bold text-gray-300 border-b border-gray-600 pb-2 mb-3">参数设置</h3>
                                <div className="flex gap-2 mb-4">
                                    <button onClick={() => loadPreset('flat')} className="flex-1 py-1 bg-gray-700 hover:bg-blue-900 text-xs rounded border border-gray-600 transition">
                                        情形1: 平缓 (|k|&le;1)
                                    </button>
                                    <button onClick={() => loadPreset('steep')} className="flex-1 py-1 bg-gray-700 hover:bg-blue-900 text-xs rounded border border-gray-600 transition">
                                        情形2: 陡峭 (|k|&gt;1)
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="input-group"><label>起点 X0</label><input type="number" name="x0" value={coords.x0} onChange={handleInputChange} min="0" max="19" /></div>
                                        <div className="input-group"><label>起点 Y0</label><input type="number" name="y0" value={coords.y0} onChange={handleInputChange} min="0" max="19" /></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="input-group"><label>终点 X1</label><input type="number" name="x1" value={coords.x1} onChange={handleInputChange} min="0" max="19" /></div>
                                        <div className="input-group"><label>终点 Y1</label><input type="number" name="y1" value={coords.y1} onChange={handleInputChange} min="0" max="19" /></div>
                                    </div>
                                </div>
                            </div>

                            {/* 算法状态区 */}
                            <div className="panel p-4 rounded bg-gradient-to-br from-gray-800 to-gray-900">
                                <h3 className="text-sm font-bold text-blue-300 border-b border-gray-600 pb-2 mb-3 flex justify-between">
                                    <span>算法核心数据 (计算用)</span>
                                    <span className="text-xs font-normal text-gray-400">{algoData.steep ? "陡峭模式 (dx/dy已互换)" : "平缓模式 (标准)"}</span>
                                </h3>
                                <div className="grid grid-cols-2 gap-y-2 text-xs font-mono">
                                    <span className="text-gray-400">Δx (步数):</span> <span className="text-white">{algoData.logs.length > 0 ? algoData.logs.length - 1 : 0}</span>
                                    <span className="text-gray-400">初始 P0:</span> <span className="text-yellow-400">{algoData.p0}</span>
                                    
                                    {/* 新增：常数展示 */}
                                    <span className="text-gray-400">常量 2Δy:</span> <span className="text-green-400">{algoData.const1}</span>
                                    <span className="text-gray-400">常量 2Δy - 2Δx:</span> <span className="text-red-400">{algoData.const2}</span>
                                </div>
                                <div className="mt-2 pt-2 border-t border-gray-700 text-xs text-gray-500">
                                    如果 P_k &ge; 0，加红色常量；如果 P_k &lt; 0，加绿色常量。
                                </div>
                            </div>

                            {/* 日志表 */}
                            <div className="panel rounded flex-1 flex flex-col overflow-hidden" style={{maxHeight: '300px'}}>
                                <div className="p-2 bg-gray-800 border-b border-gray-600 text-xs font-bold text-gray-300">
                                    迭代过程表 (Decision Table)
                                </div>
                                <div className="overflow-y-auto flex-1">
                                    <table className="w-full text-xs data-table border-collapse">
                                        <thead className="bg-gray-700 text-gray-400 sticky top-0">
                                            <tr>
                                                <th className="w-12">Step</th>
                                                <th className="w-16">Pk</th>
                                                <th>Next Selection</th>
                                                <th>P_{`{k+1}`} 推导 (Derivation)</th>
                                            </tr>
                                        </thead>
                                        <tbody className="font-mono text-gray-300">
                                            {algoData.logs.map((log, idx) => (
                                                <tr key={idx} className={idx === currentStep - 1 ? "bg-blue-900/50 text-white" : ""}>
                                                    <td>{log.step}</td>
                                                    <td className={log.p >= 0 ? "text-green-400 font-bold" : "text-red-400 font-bold"}>{log.p}</td>
                                                    <td className="text-gray-400">{log.action}</td>
                                                    <td className="text-gray-500 text-[10px]">{log.calc}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
