<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Buffer 算法交互演示 (6x6)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code:wght@500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            user-select: none;
        }

        .font-mono {
            font-family: 'Fira Code', monospace;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 1;
        }

        .pixel {
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: crosshair;
            border: 1px solid rgba(0,0,0,0.05);
            position: relative;
        }

        .pixel:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        /* Depth buffer specific styles */
        .pixel.depth-pixel {
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        
        /* Animation for updates */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        .updated {
            animation: pop 0.3s ease-out;
            border: 2px solid #22c55e !important;
        }

        .rejected {
            animation: pop 0.3s ease-out;
            border: 2px solid #ef4444 !important;
            opacity: 0.5;
        }

        .control-btn {
            transition: all 0.2s;
        }
        .control-btn:active {
            transform: scale(0.95);
        }
        
        .shape-preview {
            width: 20px;
            height: 20px;
            background: currentColor;
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4 md:p-8 text-gray-800">

    <!-- Header -->
    <header class="text-center mb-8 max-w-2xl">
        <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 mb-2 tracking-tight">
            Z-Buffer 算法交互演示
        </h1>
        <p class="text-gray-500 text-sm md:text-base">
            在一个 6x6 的微型显卡上体验深度测试 (Depth Test) 的魔法。<br>
            <span class="text-blue-600 font-semibold">规则：深度值 (Z) 越小越近，近处的像素覆盖远处的像素。</span>
        </p>
    </header>

    <!-- Main Content -->
    <main class="flex flex-col lg:flex-row gap-8 w-full max-w-6xl items-start justify-center">
        
        <!-- Controls Panel -->
        <div class="bg-white p-6 rounded-2xl shadow-lg w-full lg:w-80 border border-gray-100 flex flex-col gap-6">
            <div>
                <h2 class="text-lg font-bold mb-4 flex items-center text-gray-800">
                    <svg class="w-5 h-5 mr-2 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
                    绘制控制 (Draw Call)
                </h2>
                
                <!-- Shape Selection -->
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2">1. 选择形状</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setShape('triangle')" id="btn-triangle" class="control-btn p-2 rounded-lg border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 flex flex-col items-center gap-1 bg-indigo-50 border-indigo-500 ring-1 ring-indigo-500">
                            <div class="w-6 h-6 bg-gray-800" style="clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
                            <span class="text-xs font-medium">三角形</span>
                        </button>
                        <button onclick="setShape('rect')" id="btn-rect" class="control-btn p-2 rounded-lg border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 flex flex-col items-center gap-1">
                            <div class="w-6 h-6 bg-gray-800 rounded-sm"></div>
                            <span class="text-xs font-medium">矩形</span>
                        </button>
                        <button onclick="setShape('diamond')" id="btn-diamond" class="control-btn p-2 rounded-lg border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 flex flex-col items-center gap-1">
                            <div class="w-6 h-6 bg-gray-800 transform rotate-45 rounded-sm"></div>
                            <span class="text-xs font-medium">菱形</span>
                        </button>
                    </div>
                </div>

                <!-- Color Selection -->
                <div class="mb-4">
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-2">2. 选择颜色</label>
                    <div class="flex gap-2 justify-between">
                        <button onclick="setColor('#ef4444')" class="control-btn w-8 h-8 rounded-full bg-red-500 border-2 border-transparent hover:scale-110 focus:ring-2 focus:ring-offset-2 focus:ring-red-500 ring-2 ring-offset-2 ring-red-500" id="color-red"></button>
                        <button onclick="setColor('#3b82f6')" class="control-btn w-8 h-8 rounded-full bg-blue-500 border-2 border-transparent hover:scale-110 focus:ring-2 focus:ring-offset-2 focus:ring-blue-500" id="color-blue"></button>
                        <button onclick="setColor('#22c55e')" class="control-btn w-8 h-8 rounded-full bg-green-500 border-2 border-transparent hover:scale-110 focus:ring-2 focus:ring-offset-2 focus:ring-green-500" id="color-green"></button>
                        <button onclick="setColor('#eab308')" class="control-btn w-8 h-8 rounded-full bg-yellow-500 border-2 border-transparent hover:scale-110 focus:ring-2 focus:ring-offset-2 focus:ring-yellow-500" id="color-yellow"></button>
                        <button onclick="setColor('#a855f7')" class="control-btn w-8 h-8 rounded-full bg-purple-500 border-2 border-transparent hover:scale-110 focus:ring-2 focus:ring-offset-2 focus:ring-purple-500" id="color-purple"></button>
                    </div>
                </div>

                <!-- Depth Slider -->
                <div class="mb-6">
                    <div class="flex justify-between mb-2">
                        <label class="block text-xs font-semibold text-gray-500 uppercase">3. 设定深度 (Z)</label>
                        <span id="depth-val" class="text-xs font-bold font-mono text-indigo-600">0.50</span>
                    </div>
                    <input type="range" min="0.05" max="0.95" step="0.05" value="0.5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" oninput="updateDepthDisplay(this.value)">
                    <div class="flex justify-between text-[10px] text-gray-400 mt-1">
                        <span>0.0 (近/Near)</span>
                        <span>1.0 (远/Far)</span>
                    </div>
                </div>

                <button onclick="drawShape()" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-lg shadow-indigo-200 active:shadow-none transition-all transform active:translate-y-0.5 mb-3">
                    绘制形状 (Draw)
                </button>
                
                <button onclick="resetBuffers()" class="w-full py-2 bg-white border border-gray-200 text-gray-600 hover:bg-gray-50 rounded-xl font-semibold text-sm transition-all">
                    重置缓冲区 (Clear)
                </button>
            </div>
            
            <!-- Log Console -->
            <div class="bg-gray-900 rounded-lg p-3 text-xs font-mono h-32 overflow-y-auto border border-gray-700 shadow-inner" id="console-log">
                <div class="text-gray-500 italic">> System initialized...</div>
                <div class="text-gray-500 italic">> Depth buffer cleared to 1.0</div>
                <div class="text-gray-500 italic">> Color buffer cleared to white</div>
            </div>
        </div>

        <!-- Buffers Visualization -->
        <div class="flex flex-col md:flex-row gap-8 flex-1 justify-center w-full">
            
            <!-- Color Buffer -->
            <div class="flex flex-col items-center w-full max-w-[300px]">
                <div class="mb-3 text-center">
                    <h3 class="text-lg font-bold text-gray-800">颜色缓存 (Color)</h3>
                    <span class="text-xs text-gray-500">存储最终显示的像素颜色</span>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-md border border-gray-200 w-full">
                    <div id="color-grid" class="grid-container">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </div>

            <!-- Depth Buffer -->
            <div class="flex flex-col items-center w-full max-w-[300px]">
                 <div class="mb-3 text-center">
                    <h3 class="text-lg font-bold text-gray-800">深度缓存 (Depth)</h3>
                    <span class="text-xs text-gray-500">存储像素当前的最小 Z 值</span>
                </div>
                <div class="bg-white p-2 rounded-xl shadow-md border border-gray-200 w-full">
                    <div id="depth-grid" class="grid-container">
                        <!-- Generated by JS -->
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Tooltip (Hidden by default) -->
    <div id="tooltip" class="fixed hidden pointer-events-none bg-gray-900 text-white text-xs p-2 rounded z-50 shadow-xl opacity-0 transition-opacity duration-200"></div>

    <script>
        // --- Configuration & State ---
        const GRID_SIZE = 6;
        let buffers = {
            color: [],
            depth: []
        };
        
        let currentSettings = {
            shape: 'triangle',
            color: '#ef4444',
            z: 0.5
        };

        // Shape definitions (coordinates in 6x6 grid)
        const shapes = {
            triangle: [
                {x:2, y:1}, 
                {x:1, y:2}, {x:2, y:2}, {x:3, y:2}, 
                {x:0, y:3}, {x:1, y:3}, {x:2, y:3}, {x:3, y:3}, {x:4, y:3}
            ],
            rect: [
                {x:1, y:1}, {x:2, y:1}, {x:3, y:1}, {x:4, y:1},
                {x:1, y:2}, {x:2, y:2}, {x:3, y:2}, {x:4, y:2},
                {x:1, y:3}, {x:2, y:3}, {x:3, y:3}, {x:4, y:3}
            ],
            diamond: [
                {x:2, y:0},
                {x:1, y:1}, {x:2, y:1}, {x:3, y:1},
                {x:0, y:2}, {x:1, y:2}, {x:2, y:2}, {x:3, y:2}, {x:4, y:2},
                {x:1, y:3}, {x:2, y:3}, {x:3, y:3},
                {x:2, y:4}
            ]
        };

        // --- Initialization ---
        function init() {
            // FIX: Swap the order. Setup UI first, THEN reset/render buffers.
            setupUI();
            resetBuffers();
        }

        function resetBuffers() {
            buffers.color = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill('#ffffff'));
            buffers.depth = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(1.0)); // 1.0 is farthest
            renderGrids();
            log("Buffers cleared.", "text-blue-400");
        }

        function createGridElement(id, isDepth) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            
            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    const div = document.createElement('div');
                    div.className = 'pixel';
                    div.dataset.x = x;
                    div.dataset.y = y;
                    div.dataset.type = isDepth ? 'depth' : 'color';
                    
                    // Hover events for tooltip
                    div.addEventListener('mousemove', (e) => showTooltip(e, x, y));
                    div.addEventListener('mouseleave', hideTooltip);

                    container.appendChild(div);
                }
            }
        }

        function setupUI() {
            createGridElement('color-grid', false);
            createGridElement('depth-grid', true);
        }

        // --- Rendering Logic ---
        function renderGrids() {
            const colorContainer = document.getElementById('color-grid');
            const depthContainer = document.getElementById('depth-grid');

            // Safety check: Don't try to render if DOM elements don't exist yet
            if (!colorContainer || !depthContainer || colorContainer.children.length === 0) return;

            const colorPixels = colorContainer.children;
            const depthPixels = depthContainer.children;

            for(let y=0; y<GRID_SIZE; y++) {
                for(let x=0; x<GRID_SIZE; x++) {
                    const idx = y * GRID_SIZE + x;
                    
                    // Safe access check
                    if (!colorPixels[idx] || !depthPixels[idx]) continue;

                    // Update Color Grid
                    const colorVal = buffers.color[y][x];
                    colorPixels[idx].style.backgroundColor = colorVal;

                    // Update Depth Grid
                    const zVal = buffers.depth[y][x];
                    const zDisplay = zVal.toFixed(2);
                    
                    // Visualizing depth
                    const grayScale = Math.floor(zVal * 255);
                    depthPixels[idx].style.backgroundColor = `rgb(${grayScale}, ${grayScale}, ${grayScale})`;
                    depthPixels[idx].innerText = zDisplay;
                    depthPixels[idx].classList.add('depth-pixel');
                    
                    // Text contrast adjustment
                    depthPixels[idx].style.color = zVal > 0.5 ? '#333' : '#fff';
                }
            }
        }

        // --- Draw Logic (The Core Algorithm) ---
        async function drawShape() {
            const shapeType = currentSettings.shape;
            const drawColor = currentSettings.color;
            const drawZ = parseFloat(currentSettings.z);
            
            const pixels = shapes[shapeType];
            
            log(`> Drawing ${shapeType} at Z=${drawZ.toFixed(2)}`, "text-yellow-400");

            let updateCount = 0;

            // Process each pixel of the shape
            for (let p of pixels) {
                const {x, y} = p;
                
                // Boundary check
                if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) continue;

                const currentZ = buffers.depth[y][x];
                
                // Get DOM elements for animation
                const idx = y * GRID_SIZE + x;
                
                const colorContainer = document.getElementById('color-grid');
                const depthContainer = document.getElementById('depth-grid');
                
                if (!colorContainer || !depthContainer) return;
                
                const colorEl = colorContainer.children[idx];
                const depthEl = depthContainer.children[idx];

                if (!colorEl || !depthEl) continue;

                // --- Z-BUFFER ALGORITHM ---
                // If new fragment is closer (drawZ < currentZ)
                if (drawZ <= currentZ) {
                    // Update buffers
                    buffers.depth[y][x] = drawZ;
                    buffers.color[y][x] = drawColor;
                    
                    // Animation class
                    animatePixel(colorEl, 'updated');
                    animatePixel(depthEl, 'updated');
                    updateCount++;
                } else {
                    // Failed depth test
                    animatePixel(colorEl, 'rejected'); // Visual feedback for rejection
                    animatePixel(depthEl, 'rejected');
                }
            }

            // Re-render grids to reflect state
            // Use a small timeout to allow animation classes to trigger
            setTimeout(renderGrids, 50);

            if(updateCount > 0) {
                log(`  Updated ${updateCount} pixels.`, "text-green-400");
            } else {
                log(`  All pixels occluded (behind current).`, "text-red-400");
            }
        }

        function animatePixel(el, className) {
            el.classList.remove('updated', 'rejected');
            void el.offsetWidth; // Trigger reflow
            el.classList.add(className);
        }


        // --- Controls ---
        function setShape(shape) {
            currentSettings.shape = shape;
            // Update UI styles
            ['triangle', 'rect', 'diamond'].forEach(s => {
                const btn = document.getElementById(`btn-${s}`);
                if(s === shape) {
                    btn.className = "control-btn p-2 rounded-lg border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 flex flex-col items-center gap-1 bg-indigo-50 border-indigo-500 ring-1 ring-indigo-500";
                } else {
                    btn.className = "control-btn p-2 rounded-lg border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 flex flex-col items-center gap-1";
                }
            });
        }

        function setColor(hex) {
            currentSettings.color = hex;
            // Remove rings from all
            document.querySelectorAll('[id^="color-"]').forEach(el => {
                el.classList.remove('ring-2', 'ring-offset-2');
                // Re-add dynamic color ring logic if needed, but Tailwind classes handle focus well. 
                // Let's manually handle active state visual
                el.style.transform = 'scale(1)';
            });
            
            // Add specific ring to selected
            // Simple mapping based on hex is tricky, let's use ID mapping logic or simple outline
            // For simplicity in this demo, we rely on the button click visual feedback logic in update
             // Actually let's find the button by hex? No, let's map ID.
             const colorMap = {
                 '#ef4444': 'color-red',
                 '#3b82f6': 'color-blue',
                 '#22c55e': 'color-green',
                 '#eab308': 'color-yellow',
                 '#a855f7': 'color-purple'
             };
             const id = colorMap[hex];
             if(id) {
                 const btn = document.getElementById(id);
                 btn.classList.add('ring-2', 'ring-offset-2');
                 btn.style.transform = 'scale(1.1)';
             }
        }

        function updateDepthDisplay(val) {
            currentSettings.z = val;
            document.getElementById('depth-val').innerText = parseFloat(val).toFixed(2);
        }

        function log(msg, colorClass = "text-gray-300") {
            const consoleEl = document.getElementById('console-log');
            const entry = document.createElement('div');
            entry.className = colorClass;
            entry.innerText = msg;
            consoleEl.appendChild(entry);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // --- Tooltip ---
        const tooltip = document.getElementById('tooltip');
        
        function showTooltip(e, x, y) {
            const z = buffers.depth[y][x];
            const c = buffers.color[y][x];
            
            tooltip.innerHTML = `
                <div class="font-bold border-b border-gray-700 mb-1 pb-1">Pixel (${x}, ${y})</div>
                <div class="flex justify-between gap-4"><span>Z-Depth:</span> <span class="font-mono text-yellow-400">${z.toFixed(2)}</span></div>
                <div class="flex justify-between gap-4 items-center"><span>Color:</span> <div class="w-3 h-3 border border-white" style="background:${c}"></div></div>
            `;
            
            tooltip.style.left = e.clientX + 15 + 'px';
            tooltip.style.top = e.clientY + 15 + 'px';
            tooltip.classList.remove('hidden');
            tooltip.style.opacity = 1;
        }

        function hideTooltip() {
            tooltip.style.opacity = 0;
            tooltip.classList.add('hidden');
        }

        // Init
        init();
        // Set default selection visually
        setColor('#ef4444'); 

    </script>
</body>
</html>
