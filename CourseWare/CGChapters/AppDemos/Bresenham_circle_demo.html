<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bresenham 画圆算法交互演示 - 计算机图形学</title>
    
    <!-- 引入 React, ReactDOM, Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .canvas-container {
            background-color: #1e1e1e;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            border-radius: 8px;
        }
        .panel {
            background-color: #252526;
            border: 1px solid #3e3e42;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: #9ca3af;
            margin-bottom: 0.25rem;
        }
        .input-group input {
            background: #333;
            border: 1px solid #555;
            color: white;
            border-radius: 4px;
            padding: 4px 8px;
            width: 100%;
            font-family: monospace;
        }
        /* 表格样式 */
        .data-table th, .data-table td {
            padding: 6px 10px;
            text-align: left;
        }
        .data-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 配置常量 ---
        // 使用中心坐标系，范围从 -GRID_HALF 到 +GRID_HALF
        const GRID_COUNT = 32; // 32x32总格子数，足够容纳 R=15
        const CELL_SIZE = 22;  // 格子大小
        const CANVAS_SIZE = GRID_COUNT * CELL_SIZE;
        const CENTER_OFFSET = CANVAS_SIZE / 2;

        const App = () => {
            // --- 状态定义 ---
            const [radius, setRadius] = useState(10);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentStep, setCurrentStep] = useState(0);
            
            // 算法数据
            const [algoData, setAlgoData] = useState({ 
                steps: [], 
                p0: 0 
            });

            const canvasRef = useRef(null);

            // --- 算法核心：中点画圆算法 (Midpoint Circle Algorithm) ---
            // 这是一个 Bresenham 算法的变种，用于圆
            const calculateCircle = (r) => {
                const steps = [];
                
                let x = 0;
                let y = r;
                
                // 初始决策参数 P0 = 1 - r (对于整数半径)
                // 也有文献使用 P0 = 5/4 - r，但在整数运算中 1-r 足矣
                let p = 1 - r; 

                // 循环直到 x > y (绘制完 1/8 圆弧，即 90度 到 45度区域)
                // 或者是从 0,R 出发顺时针，这里我们使用标准 (0, R) 出发
                // 并在第一象限上半部 (Octant 2) 进行计算
                while (x <= y) {
                    // 生成当前步的所有对称点
                    const symmetryPoints = [
                        { x: x, y: y, region: '基准 (Octant 2)' }, // x, y
                        { x: y, y: x, region: 'Sym 1' },           // y, x
                        { x: y, y: -x, region: 'Sym 2' },          // y, -x
                        { x: x, y: -y, region: 'Sym 3' },          // x, -y
                        { x: -x, y: -y, region: 'Sym 4' },         // -x, -y
                        { x: -y, y: -x, region: 'Sym 5' },         // -y, -x
                        { x: -y, y: x, region: 'Sym 6' },          // -y, x
                        { x: -x, y: y, region: 'Sym 7' }           // -x, y
                    ];

                    // 记录这一步的数据
                    steps.push({
                        index: steps.length,
                        x: x,
                        y: y,
                        p: p, // 当前这一步用于做判断的 P
                        points: symmetryPoints,
                        action: p < 0 ? "E (x+1)" : "SE (x+1, y-1)",
                        nextP: p < 0 ? p + 2*x + 3 : p + 2*x - 2*y + 5
                    });

                    // 迭代更新
                    if (p < 0) {
                        // 选中点 E (East)
                        p = p + 2 * x + 3;
                    } else {
                        // 选中点 SE (South East)
                        p = p + 2 * x - 2 * y + 5;
                        y--;
                    }
                    x++;
                }
                
                setAlgoData({
                    steps,
                    p0: 1 - r
                });
            };

            // --- 副作用 ---
            // 半径改变时重新计算
            useEffect(() => {
                calculateCircle(radius);
                setCurrentStep(0);
                setIsPlaying(false);
            }, [radius]);

            // 自动播放
            useEffect(() => {
                let timer;
                if (isPlaying) {
                    if (currentStep < algoData.steps.length) {
                        timer = setTimeout(() => {
                            setCurrentStep(s => s + 1);
                        }, 400); // 稍微慢一点以便观察对称性
                    } else {
                        setIsPlaying(false);
                    }
                }
                return () => clearTimeout(timer);
            }, [isPlaying, currentStep, algoData.steps.length]);

            // 绘图逻辑
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');

                // 清屏
                ctx.fillStyle = "#1e1e1e";
                ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

                // 绘制网格和坐标轴
                drawGrid(ctx);
                drawAxes(ctx);

                // 绘制理想圆 (数学上的圆)
                drawIdealCircle(ctx, radius);

                // 绘制计算出的像素点
                algoData.steps.forEach((step, idx) => {
                    if (idx < currentStep) {
                        const isCurrent = idx === currentStep - 1;
                        
                        // 绘制该步的基准点 (高亮)
                        const base = step.points[0];
                        drawPixel(ctx, base.x, base.y, isCurrent ? "#FCD34D" : "#3B82F6", true); // 黄色/蓝色

                        // 绘制对称点 (略暗)
                        for (let i = 1; i < 8; i++) {
                            const pt = step.points[i];
                            // 只有当 x!=0 或 y!=0 或 x!=y 时，才会有不重叠的对称点
                            // Set去重逻辑太复杂，这里简单画，重叠无所谓
                            drawPixel(ctx, pt.x, pt.y, isCurrent ? "#60A5FA" : "#1D4ED8", false);
                        }
                    }
                });

            }, [algoData, currentStep, radius]);

            // --- 交互处理 ---
            const handleRadiusChange = (e) => {
                let val = parseInt(e.target.value);
                if (val < 1) val = 1;
                if (val > 15) val = 15; // 限制最大半径防止超出网格
                setRadius(val);
            };

            // --- 绘图辅助函数 ---
            // 将数学坐标 (x,y) 转换为 Canvas 坐标 (cx, cy)
            // 原点 (0,0) 在 Canvas 中心
            const toScreen = (x, y) => {
                // x: 向右为正
                // y: 向上为正 (Canvas y 向下为正，所以要反转)
                return {
                    x: CENTER_OFFSET + x * CELL_SIZE,
                    y: CENTER_OFFSET - (y + 1) * CELL_SIZE // y+1 是为了让格子对其坐标轴上方
                };
            };

            const drawGrid = (ctx) => {
                ctx.strokeStyle = "#333";
                ctx.lineWidth = 1;
                for (let i = 0; i <= GRID_COUNT; i++) {
                    let pos = i * CELL_SIZE;
                    ctx.beginPath(); ctx.moveTo(pos, 0); ctx.lineTo(pos, CANVAS_SIZE); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(0, pos); ctx.lineTo(CANVAS_SIZE, pos); ctx.stroke();
                }
            };

            const drawAxes = (ctx) => {
                ctx.strokeStyle = "#666";
                ctx.lineWidth = 2;
                // X轴
                ctx.beginPath(); 
                ctx.moveTo(0, CENTER_OFFSET); 
                ctx.lineTo(CANVAS_SIZE, CENTER_OFFSET); 
                ctx.stroke();
                // Y轴
                ctx.beginPath(); 
                ctx.moveTo(CENTER_OFFSET, 0); 
                ctx.lineTo(CENTER_OFFSET, CANVAS_SIZE); 
                ctx.stroke();

                // 标注原点
                ctx.fillStyle = "#AAA";
                ctx.font = "10px monospace";
                ctx.fillText("(0,0)", CENTER_OFFSET + 5, CENTER_OFFSET + 15);
            };

            const drawIdealCircle = (ctx, r) => {
                ctx.beginPath();
                // arc(x, y, radius, startAngle, endAngle)
                // Canvas 的 arc 半径是像素值，所以要 r * CELL_SIZE
                // 并且要在每个格子中心画，所以要对齐
                ctx.arc(CENTER_OFFSET, CENTER_OFFSET, r * CELL_SIZE, 0, 2 * Math.PI);
                ctx.strokeStyle = "#EF4444"; // Red
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            };

            const drawPixel = (ctx, x, y, color, isBase) => {
                const pos = toScreen(x, y);
                ctx.fillStyle = color;
                // 留一点缝隙
                ctx.fillRect(pos.x + 1, pos.y + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                
                // 如果是基准点，画个框或者文字
                if (isBase && Math.abs(x) + Math.abs(y) < 40) { // 避免文字太多
                    ctx.fillStyle = "#000";
                    ctx.font = "9px monospace";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    // ctx.fillText(`${x},${y}`, pos.x + CELL_SIZE/2, pos.y + CELL_SIZE/2);
                }
            };

            return (
                <div className="min-h-screen p-4 flex flex-col items-center">
                    <header className="mb-4 text-center">
                        <h1 className="text-2xl font-bold text-blue-400">Bresenham 画圆算法演示</h1>
                        <p className="text-gray-500 text-xs mt-1">中点画圆法 (Midpoint Circle Algorithm) 与八路对称性</p>
                    </header>

                    <div className="flex flex-col lg:flex-row gap-6 w-full max-w-6xl">
                        
                        {/* 左侧：画布与控制 */}
                        <div className="flex flex-col gap-4">
                            <div className="canvas-container relative">
                                <canvas 
                                    ref={canvasRef}
                                    width={CANVAS_SIZE}
                                    height={CANVAS_SIZE}
                                    className="block"
                                />
                                <div className="absolute bottom-2 right-2 text-xs text-gray-600 pointer-events-none select-none">
                                    Grid: {GRID_COUNT}x{GRID_COUNT} | Center: (0,0)
                                </div>
                                {/* 象限标注 */}
                                <div className="absolute top-2 right-2 text-xs text-gray-600 pointer-events-none">I</div>
                                <div className="absolute top-2 left-2 text-xs text-gray-600 pointer-events-none">II</div>
                                <div className="absolute bottom-2 left-2 text-xs text-gray-600 pointer-events-none">III</div>
                                <div className="absolute bottom-2 right-2 text-xs text-gray-600 pointer-events-none">IV</div>
                            </div>

                            {/* 播放控制 */}
                            <div className="panel p-3 rounded flex justify-between items-center">
                                <div className="text-xs text-gray-400">
                                    步骤: <span className="text-white font-mono">{currentStep} / {algoData.steps.length}</span>
                                </div>
                                <div className="flex gap-2">
                                    <button onClick={() => {setIsPlaying(false); setCurrentStep(0);}} className="px-3 py-1 bg-gray-700 hover:bg-gray-600 rounded text-xs text-white">重置</button>
                                    <button onClick={() => setIsPlaying(!isPlaying)} className={`px-3 py-1 rounded text-xs text-white w-20 ${isPlaying ? 'bg-yellow-600' : 'bg-green-600'}`}>
                                        {isPlaying ? "暂停" : "自动绘制"}
                                    </button>
                                    <button onClick={() => {setIsPlaying(false); setCurrentStep(Math.min(currentStep + 1, algoData.steps.length));}} className="px-3 py-1 bg-blue-600 hover:bg-blue-500 rounded text-xs text-white">单步 &gt;</button>
                                </div>
                            </div>
                        </div>

                        {/* 右侧：数据面板 */}
                        <div className="flex-1 flex flex-col gap-4 min-w-[300px]">
                            
                            {/* 参数设置 */}
                            <div className="panel p-4 rounded">
                                <h3 className="text-sm font-bold text-gray-300 border-b border-gray-600 pb-2 mb-3">参数设置</h3>
                                <div className="input-group">
                                    <label>圆半径 R (Radius) [1-15]</label>
                                    <input 
                                        type="range" min="1" max="15" 
                                        value={radius} onChange={handleRadiusChange}
                                        className="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer"
                                    />
                                    <div className="flex justify-between mt-1">
                                        <span className="text-xs text-gray-500">1</span>
                                        <span className="text-blue-400 font-bold text-lg">{radius}</span>
                                        <span className="text-xs text-gray-500">15</span>
                                    </div>
                                </div>
                            </div>

                            {/* 算法状态 */}
                            <div className="panel p-4 rounded bg-gradient-to-br from-gray-800 to-gray-900">
                                <h3 className="text-sm font-bold text-blue-300 border-b border-gray-600 pb-2 mb-3">
                                    算法核心原理
                                </h3>
                                <div className="text-xs text-gray-400 space-y-2 font-mono">
                                    <p>1. <span className="text-white">初始点:</span> (0, R) = (0, {radius})</p>
                                    <p>2. <span className="text-white">初始决策 P0:</span> 1 - R = <span className="text-yellow-400">{algoData.p0}</span></p>
                                    <p>3. <span className="text-white">循环条件:</span> x &le; y (仅计算 1/8 圆弧)</p>
                                    <div className="mt-2 pt-2 border-t border-gray-700">
                                        <p><span className="text-green-400">若 P &lt; 0:</span> 选 E (x+1, y), P += 2x + 3</p>
                                        <p><span className="text-red-400">若 P &ge; 0:</span> 选 SE (x+1, y-1), P += 2x - 2y + 5</p>
                                    </div>
                                </div>
                            </div>

                            {/* 迭代日志 */}
                            <div className="panel rounded flex-1 flex flex-col overflow-hidden" style={{maxHeight: '400px'}}>
                                <div className="p-2 bg-gray-800 border-b border-gray-600 text-xs font-bold text-gray-300 flex justify-between items-center">
                                    <span>计算日志 (1/8 Arc)</span>
                                    <span className="text-[10px] text-blue-300 font-normal">黄色=基准点 | 蓝色=对称点</span>
                                </div>
                                <div className="overflow-y-auto flex-1">
                                    <table className="w-full text-xs data-table border-collapse">
                                        <thead className="bg-gray-700 text-gray-400 sticky top-0">
                                            <tr>
                                                <th className="w-10">k</th>
                                                <th className="w-16">Pk</th>
                                                <th>Point (x,y)</th>
                                                <th>Next P</th>
                                            </tr>
                                        </thead>
                                        <tbody className="font-mono text-gray-300">
                                            {algoData.steps.map((s, idx) => (
                                                <tr key={idx} className={idx === currentStep - 1 ? "bg-blue-900/50 text-white" : ""}>
                                                    <td>{s.index}</td>
                                                    <td className={s.p < 0 ? "text-green-400" : "text-red-400"}>{s.p}</td>
                                                    <td className="font-bold text-yellow-300">({s.x}, {s.y})</td>
                                                    <td className="text-gray-500 text-[10px]">{s.nextP} ({s.action})</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
